---
name: Theme Verification

on:
  push:
    branches:
      - master
    paths:
      - 'CTFdpp/themes/**'
  pull_request:
    branches:
      - master
    paths:
      - 'CTFdpp/themes/**'

jobs:
  build:

    runs-on: ubuntu-latest

    name: Theme Verification
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19

      - name: Verify admin theme
        run: |
            pwd
            yarn install --non-interactive
            yarn verify 
        working-directory: ./CTFdpp/themes/admin

      # TODO: Replace in 4.0 with deprecation of previous core theme
      - name: Verify core theme
        run: |
            pwd
            yarn install --non-interactive
            yarn verify
        working-directory: ./CTFdpp/themes/core
