services:
  ctfdpp:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfdpp:ctfdpp@db/ctfdpp
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFdpp
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - logs:/var/log/CTFdpp
      - uploads:/var/uploads
      - .:/opt/CTFdpp:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
        default:
        internal:

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - .data/caddy/data:/data
      - .data/caddy/config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - ctfdpp

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=ctfdpp
      - MARIADB_USER=ctfdpp
      - MARIADB_PASSWORD=ctfdpp
      - MARIADB_DATABASE=ctfdpp
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - .data/mysql:/var/lib/mysql
    networks:
        internal:
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    restart: unless-stopped
    volumes:
    - .data/redis:/data
    networks:
        internal:

networks:
    default:
    internal:
        internal: true

volumes:
    uploads:
    logs:
